name: Build Maxdis APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Mengunci instalasi Gradle di versi 8.4 yang stabil untuk Android 14 (SDK 34)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
          cache-disabled: true

      - name: Build APK
        run: gradle assembleDebug --no-daemon
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MaxdisAssistant.apk       # Mengubah nama hasil jadi dengan ekstensi langsung .apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          compression-level: 0            # Menonaktifkan kompresi ZIP agar file turun apa adanya
