name: Build Maxdis APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Langkah krusial: Membuat ulang file gradlew yang baru, bersih, dan resmi
      - name: Regenerate Gradle Wrapper
        run: |
          id
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      - name: Build APK
        # Jalankan build menggunakan gradlew baru yang dijamin bebas dari "-Xmx64m"
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MaxdisAssistant-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
