name: Build Maxdis APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build APK
        # Memperbaiki typo memori '512dp' menjadi '512m' yang bisa membuat JVM gagal start
        env:
          JAVA_OPTS: "-Xmx2048m -XX:MaxMetaspaceSize=512m"
          GRADLE_OPTS: "-Xmx2048m -Dorg.gradle.jvmargs=-Xmx2048m"
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MaxdisAssistant-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
