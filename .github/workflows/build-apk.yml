name: Build Maxdis APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Menggunakan sistem Gradle resmi dari GitHub, bypass gradlew lokal kamu
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK
        # Kita panggil perintah 'gradle' langsung, bukan './gradlew'
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MaxdisAssistant-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
